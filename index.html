<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="unsafe-none">
    <title>WEX-TIER — Создай свой тир-лист</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="parallaxWrapper"><div id="parallaxLayer"></div></div>
    <canvas id="particlesCanvas"></canvas>
    <button class="burger-btn" id="burgerBtn"><i data-lucide="menu"></i></button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">WEX-TIER</div>
            <button id="toggleSidebarBtn" class="sidebar-toggle-btn"><i data-lucide="chevron-left"></i></button>
        </div>
        
        <div id="authSection" style="padding: 10px 4px; border-bottom: 1px solid var(--input-border); margin-bottom: 10px;">
            <button id="loginBtn" class="sidebar-btn primary" style="width: 100%; padding: 10px;"><i data-lucide="log-in"></i> <span>Войти через Google</span></button>
            <div id="userProfile" style="display: none; align-items: center; gap: 12px;">
                <img id="userAvatar" src="" alt="Аватар" style="width: 36px; height: 34px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold);">
                <div style="flex: 1; min-width: 0;">
                    <div id="userName" style="font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Геймер</div>
                    <span id="logoutLink" style="font-size: 0.75rem; color: var(--text-secondary); cursor: pointer; text-decoration: underline;">Выйти</span>
                </div>
            </div>
        </div>
        
        <div class="sidebar-section">Действия</div>
        <button class="sidebar-btn" id="editBtn"><i data-lucide="edit-3"></i> Редактировать</button>
        <button class="sidebar-btn" id="undoBtn" disabled><i data-lucide="undo-2"></i> Отменить</button>
        <button class="sidebar-btn danger hidden" id="resetBtn"><i data-lucide="rotate-ccw"></i> Сбросить всё</button>
        <button class="sidebar-btn hidden" id="addTierBtn"><i data-lucide="plus-square"></i> Новый тир</button>
        
        <div class="sidebar-section">Инструменты</div>
        <button class="sidebar-btn" id="themeBtn"><i data-lucide="moon"></i> Тема</button>
        <button class="sidebar-btn" id="neonBtn"><i data-lucide="lightbulb"></i> Неон</button>
        <button class="sidebar-btn" id="parallaxBtn"><i data-lucide="layers"></i> Параллакс</button>
        <button class="sidebar-btn" id="compareBtn"><i data-lucide="users"></i> Сравнение</button>
        <button class="sidebar-btn" id="shareBtn"><i data-lucide="link"></i> Поделиться</button>
        <button class="sidebar-btn" id="playlistBtn"><i data-lucide="video"></i> YT плейлист</button>
        <button class="sidebar-btn" id="galleryBtn"><i data-lucide="image"></i> Галерея</button>
        <button class="sidebar-btn" id="duelBtn"><i data-lucide="swords"></i> Дуэль</button>
        <button class="sidebar-btn" id="topBtn"><i data-lucide="medal"></i> Топ</button>
        <button class="sidebar-btn" id="achievementsBtn"><i data-lucide="trophy"></i> Достижения</button>
        <button class="sidebar-btn" id="commentsBtn"><i data-lucide="message-square"></i> Комментарии</button>
        <button class="sidebar-btn" id="profileDashboardBtn" style="display: none;"><i data-lucide="folder-open"></i> Мои тир-листы</button>
        
        <div class="sidebar-section">Экспорт</div>
        <button class="sidebar-btn" id="pngBtn"><i data-lucide="download"></i> Скачать PNG</button>
        <button class="sidebar-btn" id="exportBtn"><i data-lucide="save"></i> Экспорт JSON</button>
        <button class="sidebar-btn" id="importBtn"><i data-lucide="folder-open"></i> Импорт JSON</button>
        <input type="file" id="importFile" accept=".json" style="display:none;">
        
        <div class="sidebar-section">Тематика</div>
        <select id="templateSelect" class="sidebar-select">
            <option value="music">🎵 Музыкальные треки</option>
            <option value="movies">🎬 Фильмы и Сериалы</option>
            <option value="games">🎮 Компьютерные Игры</option>
            <option value="actors">🎭 Популярные Актеры</option>
        </select>
        
        <div class="sidebar-section">Оформление</div>
        <select id="styleSelect" class="sidebar-select"><option value="gradient">Градиент</option><option value="shadow">Тень</option><option value="border">Рамка</option><option value="circle">Круглые</option></select>
        <select id="sizeSelect" class="sidebar-select"><option value="60">Средние</option><option value="44">Мелкие</option><option value="76">Крупные</option></select>
        <select id="bgSelect" class="sidebar-select"><option value="0">Фон 1</option><option value="1">Фон 2</option><option value="2">Фон 3</option><option value="3">Фон 4</option><option value="4">Фон 5</option><option value="5">Фон 6</option></select>
        
        <div class="sidebar-section">Черновики</div>
        <div id="draftListSidebar" style="display:flex;flex-direction:column;gap:2px;"></div>
        <button class="sidebar-btn" id="newDraftBtnSidebar" style="font-size:0.75rem;"><i data-lucide="plus"></i> Новый черновик</button>
        <div class="sidebar-spacer"></div>
        <button class="sidebar-btn danger" id="resetAllLink" style="margin-top:8px;"><i data-lucide="trash-2"></i> Сбросить данные</button>
        <div class="footer">© WEX-TIER</div>
    </aside>

    <main class="main-content" id="mainContent">
        <div class="top-bar" id="topBar">
            <input type="text" class="search-bar" id="searchInput" placeholder="Поиск по ссылке...">
            <button class="filter-btn active-filter" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="youtube">YT</button>
            <button class="filter-btn" data-filter="spotify">SP</button>
            <button class="filter-btn" data-filter="apple">AP</button>
            <button class="filter-btn" data-filter="yandex">YM</button>
        </div>
        <div class="compare-wrap" id="compareWrap">
            <div class="column" id="col1"><div class="column-title">Тир-лист 1</div><div id="list1"></div></div>
            <div class="column" id="col2" style="display:none;"><div class="column-title">Тир-лист 2</div><div id="list2"></div></div>
        </div>
        <div id="templatePoolContainer" class="top-bar" style="margin-top: 30px; max-width: 1200px; display: none; flex-direction: column; gap: 12px; width: 100%;">
            <div style="font-size: 0.9rem; color: var(--gold); font-weight: 600;">📦 Доступные элементы шаблона (перетащите в нужный тир):</div>
            <div id="templatePool" class="tier-items" style="min-height: 80px; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px dashed var(--input-border);"></div>
        </div>
    </main>

    <div id="duelVoteBar">
        <span class="vote-score" id="duelLeftWins">0</span>
        <button class="vote-btn left" id="voteLeftBtn"><i data-lucide="arrow-left"></i> Левый</button>
        <span style="color:var(--text-secondary);">VS</span>
        <button class="vote-btn right" id="voteRightBtn">Правый <i data-lucide="arrow-right"></i></button>
        <span class="vote-score" id="duelRightWins">0</span>
    </div>

    <div class="modal" id="addModal"><div class="modal-box"><h3>Добавить трек</h3><select id="svc"><option value="youtube">YouTube</option><option value="spotify">Spotify</option><option value="apple">Apple Music</option><option value="yandex">Яндекс Музыка</option></select><input type="text" id="trackUrl" placeholder="Ссылка на трек"><button class="btn btn-secondary" id="fetchCoverBtn" style="width:100%;margin-bottom:6px;">Авто-поиск обложки</button><input type="text" id="coverUrl" placeholder="Ссылка на картинку"><img class="cover-preview" id="coverPreview" src="" alt="Превью" style="display:none;"><div class="modal-actions"><button class="btn btn-secondary" id="cancelAdd">Отмена</button><button class="btn btn-primary" id="okAdd">Добавить</button></div></div></div>
    <div class="modal" id="playerModal"><div class="modal-box" style="width:600px;"><h3>YouTube</h3><iframe class="player-frame" id="playerFrame" src="" allowfullscreen></iframe><div class="modal-actions"><button class="btn btn-secondary" id="closePlayer">Закрыть</button></div></div></div>

    <script type="module" src="app.js"></script>
</body>
</html>
